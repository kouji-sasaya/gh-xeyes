services:
  gh-xeyes:
    image: gh-xeyes
    build:
      context: .
      network: host
      dockerfile: Dockerfile
    working_dir: /workdir
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${PWD}:/workdir
    tty: true
    stdin_open: true
    environment:
      - DISPLAY=$DISPLAY
      - TERM=xterm-256color
